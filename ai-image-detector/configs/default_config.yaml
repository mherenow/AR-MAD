# Dataset configuration
dataset:
  mode: "combined"
  synthbuster_root: "datasets/synthbuster"
  coco_root: "datasets/coco2017"
  image_size: 256
  val_ratio: 0.2
  balance_mode: "equal"
  num_workers: 4
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# Model configuration
model:
  backbone_type: "resnet50"
  pretrained: true
  freeze_backbone: false

  use_spectral: fasle       # Spectral artifact branch (AnyResolution / SPAI paper)
  use_noise_imprint: false  # Noise-based generator imprint branch (Noise Imprint paper)
  use_color_features: false # Chrominance distribution branch (Secret Lies in Color paper)
  use_attention: null       # Attention module: null | 'cbam' | 'se'
  use_fpn: false            # Feature Pyramid Network for multi-scale detection
  use_local_patches: false  # Local patch classifier (Fusing Global and Local paper)
  enable_attribution: false # Generator attribution output (identifies source model)


# Training configuration
training:
  batch_size: 8
  learning_rate: 0.00001
  num_epochs: 60
  optimizer: "adamw"
  weight_decay: 0.0001
  mixed_precision: true

  # Checkpoint directory
  checkpoint_dir: "checkpoints"
  # Save checkpoint every N epochs
  save_every: 5
  # Augmentation configuration.
  augmentation:
    horizontal_flip: true
    random_crop: 224
    blur:
      enabled: true
      sigma_min: 0.0
      sigma_max: 3.0
      probability: 0.1
    jpeg:
      enabled: true
      quality_min: 30
      quality_max: 100
      probability: 0.1


# Evaluation configuration
evaluation:
  checkpoint_path: "checkpoints/best_model.pth"
  batch_size: 4

device: "auto"